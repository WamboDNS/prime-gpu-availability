    <text x="654" y="21">Tue 21:14</text>
    <circle cx="728" cy="16" r="6" fill="none" stroke="#111" stroke-width="1.4"/>
    <line x1="728" y1="13" x2="728" y2="19" stroke="#111" stroke-width="1.4"/>
