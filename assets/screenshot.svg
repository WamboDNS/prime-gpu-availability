<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 32" width="760" height="32"
     font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Segoe UI, sans-serif"
     font-size="13" font-weight="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#ebebec"/>
    </linearGradient>
  </defs>
  <rect width="760" height="32" fill="url(#bg)"/>
  <rect x="0" y="31" width="760" height="1" fill="#d4d4d8"/>

  <!-- prime logo glyph (stylized) -->
